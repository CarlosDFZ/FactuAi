{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div style="padding:10px; background:#d4edda; color:#155724; margin-bottom:15px; border:1px solid #c3e6cb;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</body>
