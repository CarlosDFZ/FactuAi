{% extends "base.html" %}

{% block content %}
<h1>Uploaded PDF Files</h1>

<table border="1" cellpadding="8">
    <tr>
        <th>#</th>
        <th>Filename</th>
        <th>Action</th>
    </tr>

    {% for file in files %}
    <tr>
        <td>{{ loop.index }}</td>
        <td>{{ file }}</td>
        <td>
            <a href="/process/{{ file }}">Process</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
